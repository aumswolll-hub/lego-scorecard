<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ | LEGO SCANNER</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #171717;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 28px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      color: #b5b5b5;
      line-height: 1.6;
      font-size: 14px;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-size: 14px;
      color: #e5e5e5;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0b0b0b;
      color: white;
      box-sizing: border-box;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #ffffff;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 13px 16px;
      border: 0;
      border-radius: 10px;
      background: #ffffff;
      color: #000000;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover:not(:disabled) {
      opacity: 0.9;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    button.secondary {
      background: #262626;
      color: #ffffff;
    }

    button.link {
      background: transparent;
      color: #b5b5b5;
      text-decoration: underline;
      font-weight: 400;
      padding: 8px;
    }

    .message {
      margin-top: 14px;
      font-size: 14px;
      color: #facc15;
      line-height: 1.5;
      min-height: 20px;
    }

    .danger {
      color: #f87171;
    }

    .success {
      color: #4ade80;
    }

    .small {
      font-size: 13px;
      color: #8f8f8f;
      margin-top: 18px;
    }

    .note-box {
      margin-top: 18px;
      padding: 12px 14px;
      background: #101010;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      font-size: 13px;
      color: #b5b5b5;
      line-height: 1.6;
    }

    .note-box strong {
      color: #ffffff;
    }
  </style>

  <!-- Brand theme (overrides the dark default above) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --cream:#F5EFE6; --cream-soft:#FAF6EE; --ink:#0F0F0F; --ink-mute:#6B6B6B; --red:#C8312B; --gold:#C49A4A; --grey-line:#D9D2C5; }
    body { font-family:'Noto Sans Thai',sans-serif !important; color:var(--ink) !important;
      background:radial-gradient(ellipse 700px 500px at 18% 12%, rgba(200,49,43,0.06), transparent 60%),
                 radial-gradient(ellipse 520px 420px at 88% 92%, rgba(196,154,74,0.07), transparent 60%),
                 var(--cream) !important; }
    .card { max-width:440px !important; background:var(--cream-soft) !important; border:1.5px solid var(--ink) !important;
      border-radius:0 !important; box-shadow:8px 8px 0 var(--ink) !important; padding:48px 38px 38px !important; position:relative; }
    .login-mark { position:absolute; top:-1.5px; left:-1.5px; background:var(--ink); color:var(--cream);
      padding:8px 14px; font-family:'Fraunces',serif; font-weight:700; font-size:12px; letter-spacing:0.15em; text-transform:uppercase; }
    .card h1 { font-family:'Fraunces',serif !important; font-weight:900 !important; font-size:42px !important;
      line-height:0.96 !important; letter-spacing:-0.02em; color:var(--ink) !important; margin:6px 0 6px !important; }
    .card h1 em { font-style:italic; font-weight:500; color:var(--red); }
    .card > p { color:var(--ink-mute) !important; font-size:13px !important; margin:0 0 8px !important; }
    .card label { color:var(--ink) !important; font-size:11px !important; text-transform:uppercase;
      letter-spacing:0.16em; font-weight:600; margin-top:18px !important; }
    .card input { background:var(--cream) !important; border:1.5px solid var(--ink) !important; border-radius:0 !important;
      color:var(--ink) !important; padding:13px 14px !important; font-family:'Noto Sans Thai',sans-serif !important; }
    .card input:focus { border-color:var(--red) !important; }
    .card button { border-radius:0 !important; font-family:'Noto Sans Thai',sans-serif !important; }
    #loginBtn { background:var(--ink) !important; color:var(--cream) !important; font-weight:600 !important;
      letter-spacing:0.12em; padding:15px !important; margin-top:24px !important; transition:all .15s; }
    #loginBtn:hover:not(:disabled){ background:var(--red) !important; transform:translate(-2px,-2px); box-shadow:4px 4px 0 var(--ink); }
    #signupBtn { background:transparent !important; color:var(--ink) !important; border:1.5px solid var(--ink) !important;
      font-weight:600 !important; margin-top:10px !important; }
    #signupBtn:hover:not(:disabled){ background:var(--ink) !important; color:var(--cream) !important; }
    #resetBtn { color:var(--ink-mute) !important; }
    .message { color:#9a7320 !important; }
    .message.danger { color:var(--red) !important; }
    .message.success { color:#1E8E5A !important; }
    .note-box { background:#FFF8EC !important; border:1px solid var(--gold) !important; border-radius:0 !important;
      color:var(--ink-mute) !important; }
    .note-box strong { color:var(--ink) !important; }
    .small { color:var(--ink-mute) !important; }
    .steps-row { display:flex; gap:12px; margin:20px 0 6px; }
    .steps-row > div { flex:1; text-align:center; }
    .steps-row .n { font-family:'Fraunces',serif; font-weight:900; font-size:22px; color:var(--gold); line-height:1; }
    .steps-row .t { font-size:11px; color:var(--ink-mute); line-height:1.35; margin-top:5px; }
  </style>
</head>

<body>
  <div class="card">
    <div class="login-mark">LEGO METHOD™ · SCANNER</div>

    <h1>เข้าสู่<br><em>ระบบ</em></h1>
    <p>ใช้อีเมลเดียวกับที่ชำระเงิน หรือเคยได้รับสิทธิ์ใช้งาน LEGO SCANNER<br>ยังไม่เคยมีบัญชี — ใส่อีเมล + ตั้งรหัสผ่าน ระบบสมัครให้อัตโนมัติ</p>

    <label for="email">อีเมล</label>
    <input id="email" type="email" placeholder="your@email.com" autocomplete="email" />

    <label for="password">รหัสผ่าน</label>
    <input id="password" type="password" placeholder="อย่างน้อย 6 ตัวอักษร" autocomplete="current-password" />

    <button id="loginBtn" type="button">เข้าสู่ระบบ →</button>
    <button id="signupBtn" type="button" class="secondary">ครั้งแรก / ตั้งรหัสผ่าน</button>
    <button id="resetBtn" type="button" class="link">ลืมรหัสผ่าน?</button>

    <div id="message" class="message"></div>

    <div class="note-box">
      <strong>เคยใช้ Magic Link?</strong> ใส่อีเมลเดิม + ตั้งรหัสผ่านใหม่ (อย่างน้อย 6 ตัว) แล้วกด
      “ครั้งแรก / ตั้งรหัสผ่าน” — ระบบตั้งรหัสให้ทันที
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://kdfyfnolxhcxswbotolq.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_RxZbbxePB1RakFMi-h7LIQ_EVv0AS9_';

    let sb;

    function showMessage(text, type = 'normal') {
      const el = document.getElementById('message');
      if (!el) return;

      el.textContent = text;

      if (type === 'error') {
        el.className = 'message danger';
      } else if (type === 'success') {
        el.className = 'message success';
      } else {
        el.className = 'message';
      }
    }

    function getEmail() {
      return document.getElementById('email').value.trim().toLowerCase();
    }

    function getPassword() {
      return document.getElementById('password').value;
    }

    function setButtonsDisabled(disabled) {
      document.getElementById('loginBtn').disabled = disabled;
      document.getElementById('signupBtn').disabled = disabled;
      document.getElementById('resetBtn').disabled = disabled;
    }

    function initSupabase() {
      if (!window.supabase) {
        showMessage('โหลดระบบเข้าสู่ระบบไม่สำเร็จ กรุณารีเฟรชหน้าอีกครั้ง', 'error');
        return false;
      }

      try {
        sb = window.supabase.createClient(
          SUPABASE_URL,
          SUPABASE_ANON_KEY
        );

        return true;
      } catch (err) {
        console.error('Supabase init error:', err);
        showMessage('ระบบเข้าสู่ระบบมีปัญหา กรุณารีเฟรชหน้าอีกครั้ง', 'error');
        return false;
      }
    }

    async function goAfterAuth() {
      // มี session = เข้าแอปได้เลย — สิทธิ์/โควตาให้ /api/usage ฝั่งแอปตัดสิน
      // (ห้ามเช็คตาราง customers ตรงจากหน้านี้ — ผู้ใช้ฟรีและลูกค้าที่สิทธิ์
      // อยู่ layer ใหม่ไม่มีแถวใน customers จะโดนไล่ไป no-access ทั้งที่จ่ายแล้ว)
      showMessage('เข้าสู่ระบบสำเร็จ กำลังพาไปหน้าใช้งาน...', 'success');

      setTimeout(() => {
        window.location.href = '/';
      }, 500);
    }

    // ทางเดียวจบ: ลอง login ก่อน ถ้ายังไม่มีบัญชีสมัครให้อัตโนมัติ
    // ถ้ามีบัญชีแต่รหัสผิด บอกตรง ๆ (สิทธิ์ผูกกับอีเมล — ลูกค้าเก่าที่ยังไม่มี
    // บัญชีรหัสผ่านจะได้สิทธิ์เดิมทันทีที่สมัคร)
    async function login() {
      const email = getEmail();
      const password = getPassword();

      if (!email || !email.includes('@')) {
        showMessage('กรุณากรอกอีเมลให้ถูกต้อง', 'error');
        return;
      }

      if (!password || password.length < 6) {
        showMessage('กรุณากรอกรหัสผ่านอย่างน้อย 6 ตัวอักษร', 'error');
        return;
      }

      setButtonsDisabled(true);
      showMessage('กำลังเข้าสู่ระบบ...');

      try {
        const { error } = await sb.auth.signInWithPassword({
          email,
          password
        });

        if (!error) {
          await goAfterAuth();
          return;
        }

        const msg = String(error.message || '').toLowerCase();

        if (msg.includes('rate limit')) {
          showMessage('ระบบ Login ถี่เกินไป กรุณารอสักครู่แล้วลองใหม่', 'error');
          return;
        }

        if (!msg.includes('invalid login')) {
          console.error('Login error:', error);
          showMessage(error.message || 'เข้าสู่ระบบไม่สำเร็จ กรุณาลองใหม่', 'error');
          return;
        }

        // login ไม่ผ่าน = ยังไม่มีบัญชี หรือรหัสผิด → ลองสมัครดู
        showMessage('ยังไม่พบบัญชี กำลังสมัครให้อัตโนมัติ...');

        const { data: suData, error: suError } = await sb.auth.signUp({
          email,
          password
        });

        if (suError) {
          const suMsg = String(suError.message || '').toLowerCase();

          if (suMsg.includes('already') || suMsg.includes('registered') || suMsg.includes('exists')) {
            showMessage('มีบัญชีนี้อยู่แล้ว แต่รหัสผ่านไม่ถูกต้อง — ถ้าลืมรหัส กด “ลืมรหัสผ่าน?” ด้านล่าง', 'error');
            return;
          }

          console.error('Auto-signup error:', suError);
          showMessage(suError.message || 'เข้าสู่ระบบไม่สำเร็จ กรุณาลองใหม่', 'error');
          return;
        }

        let session = suData && suData.session ? suData.session : null;

        if (!session) {
          const { data: siData } = await sb.auth.signInWithPassword({ email, password });
          session = siData && siData.session ? siData.session : null;
        }

        if (session) {
          await goAfterAuth();
          return;
        }

        showMessage('สร้างบัญชีแล้ว แต่เข้าระบบอัตโนมัติไม่สำเร็จ กรุณากด “เข้าสู่ระบบ” อีกครั้ง', 'error');
      } catch (err) {
        console.error('Login unexpected error:', err);
        showMessage('เข้าสู่ระบบไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
      } finally {
        setButtonsDisabled(false);
      }
    }

    async function signup() {
      const email = getEmail();
      const password = getPassword();

      if (!email) {
        showMessage('กรุณากรอกอีเมลที่ใช้ชำระเงินหรือเคยได้รับสิทธิ์ใช้งาน', 'error');
        document.getElementById('email').focus();
        return;
      }

      if (!password) {
        showMessage('กรุณาตั้งรหัสผ่านใหม่อย่างน้อย 6 ตัวอักษรก่อนกดสร้างบัญชี', 'error');
        document.getElementById('password').focus();
        return;
      }

      if (password.length < 6) {
        showMessage('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'error');
        document.getElementById('password').focus();
        return;
      }

      setButtonsDisabled(true);
      showMessage('กำลังสร้างบัญชี / ตั้งรหัสผ่าน...');

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email,
            password
          })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showMessage(data.message || 'สร้างบัญชี / ตั้งรหัสผ่านไม่สำเร็จ', 'error');
          return;
        }

        showMessage('ตั้งรหัสผ่านสำเร็จ กำลังเข้าสู่ระบบ...', 'success');

        const { error } = await sb.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          console.error('Login after register error:', error);

          showMessage(
            'ตั้งรหัสผ่านสำเร็จแล้ว กรุณากดเข้าสู่ระบบอีกครั้ง',
            'success'
          );

          return;
        }

        await goAfterAuth();
      } catch (err) {
        console.error('Signup unexpected error:', err);
        showMessage('ระบบมีปัญหาชั่วคราว กรุณาลองใหม่อีกครั้ง', 'error');
      } finally {
        setButtonsDisabled(false);
      }
    }

    async function resetPassword() {
      const email = getEmail();

      if (!email) {
        showMessage('กรุณากรอกอีเมลก่อนกดตั้งรหัสผ่านใหม่', 'error');
        document.getElementById('email').focus();
        return;
      }

      setButtonsDisabled(true);
      showMessage('กำลังส่งลิงก์ตั้งรหัสผ่าน...');

      try {
        // ส่งผ่าน /api/forgot-password (Resend) — ไม่ใช้ Supabase SMTP ที่ติด
        // rate limit ต่ำมากจน email ไม่ถึงลูกค้าจริง
        const res = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email.trim().toLowerCase() })
        });

        const data = await res.json().catch(function () { return {}; });

        if (!res.ok) {
          console.error('Reset password error:', data);
          showMessage(data.message || 'ส่งลิงก์ตั้งรหัสผ่านไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
          return;
        }

        showMessage(
          'ส่งลิงก์ตั้งรหัสผ่านไปที่อีเมลแล้ว กรุณาเช็กกล่องจดหมาย / spam',
          'success'
        );
      } catch (err) {
        console.error('Reset password unexpected error:', err);
        showMessage('ส่งลิงก์ตั้งรหัสผ่านไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
      } finally {
        setButtonsDisabled(false);
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      const ok = initSupabase();

      if (!ok) return;

      // login ค้างอยู่แล้ว → เข้าแอปเลย ไม่ต้องเห็นหน้านี้ซ้ำ
      sb.auth.getSession().then(function (res) {
        if (res && res.data && res.data.session) {
          window.location.replace('/');
        }
      }).catch(function () {});

      document.getElementById('loginBtn').addEventListener('click', login);
      document.getElementById('signupBtn').addEventListener('click', signup);
      document.getElementById('resetBtn').addEventListener('click', resetPassword);

      document.getElementById('password').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          login();
        }
      });

      document.getElementById('email').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          document.getElementById('password').focus();
        }
      });
    });
  </script>
</body>
</html>
