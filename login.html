<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ | LEGO SCANNER</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #171717;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 28px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      color: #b5b5b5;
      line-height: 1.6;
      font-size: 14px;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-size: 14px;
      color: #e5e5e5;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0b0b0b;
      color: white;
      box-sizing: border-box;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #ffffff;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 13px 16px;
      border: 0;
      border-radius: 10px;
      background: #ffffff;
      color: #000000;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      opacity: 0.9;
    }

    button.secondary {
      background: #262626;
      color: #ffffff;
    }

    button.link {
      background: transparent;
      color: #b5b5b5;
      text-decoration: underline;
      font-weight: 400;
      padding: 8px;
    }

    .message {
      margin-top: 14px;
      font-size: 14px;
      color: #facc15;
      line-height: 1.5;
      min-height: 20px;
    }

    .danger {
      color: #f87171;
    }

    .success {
      color: #4ade80;
    }

    .small {
      font-size: 13px;
      color: #8f8f8f;
      margin-top: 18px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>เข้าสู่ระบบ</h1>

    <p>
      กรุณาใช้อีเมลเดียวกับที่ใช้ชำระเงินหรือเคยได้รับสิทธิ์ใช้งาน LEGO SCANNER
    </p>

    <label for="email">อีเมล</label>
    <input
      id="email"
      type="email"
      placeholder="your@email.com"
      autocomplete="email"
    />

    <label for="password">รหัสผ่าน</label>
    <input
      id="password"
      type="password"
      placeholder="อย่างน้อย 6 ตัวอักษร"
      autocomplete="current-password"
    />

    <button id="loginBtn" type="button">เข้าสู่ระบบ</button>
    <button id="signupBtn" type="button" class="secondary">สร้างบัญชีด้วยอีเมลที่ใช้ชำระเงิน</button>
    <button id="resetBtn" type="button" class="link">ลืมรหัสผ่าน / ตั้งรหัสผ่านใหม่</button>

    <div id="message" class="message"></div>

    <p class="small">
      ลูกค้าเก่าที่เคยเข้าใช้งานด้วย Magic Link ให้กด “สร้างบัญชี” และใช้อีเมลเดิม ระบบจะตรวจสิทธิ์ให้อัตโนมัติ
    </p>
  </div>

  <script>
    const SUPABASE_URL = 'https://kdfyfnolxhcxswbotolq.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_RxZbbxePB1RakFMi-h7LIQ_EVv0AS9_';

    let sb;

    function showMessage(text, type = 'normal') {
      const el = document.getElementById('message');
      if (!el) return;

      el.textContent = text;

      if (type === 'error') {
        el.className = 'message danger';
      } else if (type === 'success') {
        el.className = 'message success';
      } else {
        el.className = 'message';
      }
    }

    function getEmail() {
      return document.getElementById('email').value.trim().toLowerCase();
    }

    function getPassword() {
      return document.getElementById('password').value;
    }

    function setButtonsDisabled(disabled) {
      document.getElementById('loginBtn').disabled = disabled;
      document.getElementById('signupBtn').disabled = disabled;
      document.getElementById('resetBtn').disabled = disabled;
    }

    function initSupabase() {
      if (!window.supabase) {
        showMessage('โหลดระบบเข้าสู่ระบบไม่สำเร็จ กรุณารีเฟรชหน้าอีกครั้ง', 'error');
        return false;
      }

      try {
        sb = window.supabase.createClient(
          SUPABASE_URL,
          SUPABASE_ANON_KEY
        );

        return true;
      } catch (err) {
        console.error('Supabase init error:', err);
        showMessage('ระบบเข้าสู่ระบบมีปัญหา กรุณารีเฟรชหน้าอีกครั้ง', 'error');
        return false;
      }
    }

    async function checkCustomerAccess() {
      const { data: userData, error: userError } = await sb.auth.getUser();

      if (userError || !userData || !userData.user) {
        return {
          allowed: false,
          reason: 'not_logged_in'
        };
      }

      const email = userData.user.email.trim().toLowerCase();

      const { data: customer, error } = await sb
        .from('customers')
        .select('*')
        .eq('email', email)
        .eq('active', true)
        .is('deactivated_at', null)
        .maybeSingle();

      if (error) {
        console.error('Customer access error:', error);
        return {
          allowed: false,
          reason: 'database_error',
          error
        };
      }

      if (!customer) {
        return {
          allowed: false,
          reason: 'no_access'
        };
      }

      return {
        allowed: true,
        customer
      };
    }

    async function goAfterAuth() {
      const access = await checkCustomerAccess();

      if (access.allowed) {
        showMessage('เข้าสู่ระบบสำเร็จ กำลังพาไปหน้าใช้งาน...', 'success');

        setTimeout(() => {
          window.location.href = '/';
        }, 500);

        return;
      }

      if (access.reason === 'database_error') {
        showMessage('ระบบตรวจสิทธิ์มีปัญหา กรุณาลองใหม่อีกครั้ง', 'error');
        return;
      }

      window.location.href = '/no-access.html';
    }

    async function login() {
      const email = getEmail();
      const password = getPassword();

      if (!email || !password) {
        showMessage('กรุณากรอกอีเมลและรหัสผ่าน', 'error');
        return;
      }

      setButtonsDisabled(true);
      showMessage('กำลังเข้าสู่ระบบ...');

      try {
        const { error } = await sb.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          console.error('Login error:', error);
          showMessage('อีเมลหรือรหัสผ่านไม่ถูกต้อง', 'error');
          return;
        }

        await goAfterAuth();
      } catch (err) {
        console.error('Login unexpected error:', err);
        showMessage('เข้าสู่ระบบไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
      } finally {
        setButtonsDisabled(false);
      }
    }

    async function signup() {
      const email = getEmail();
      const password = getPassword();

      if (!email || !password) {
        showMessage('กรุณากรอกอีเมลและรหัสผ่าน', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'error');
        return;
      }

      setButtonsDisabled(true);
      showMessage('กำลังสร้างบัญชี...');

      try {
        const { error } = await sb.auth.signUp({
          email,
          password
        });

        if (error) {
          console.error('Signup error:', error);

          const msg = error.message || '';

          if (
            msg.toLowerCase().includes('already') ||
            msg.toLowerCase().includes('registered') ||
            msg.toLowerCase().includes('exists')
          ) {
            showMessage('อีเมลนี้มีบัญชีแล้ว กรุณากดเข้าสู่ระบบหรือลืมรหัสผ่าน', 'error');
            return;
          }

          showMessage(msg || 'สร้างบัญชีไม่สำเร็จ', 'error');
          return;
        }

        await goAfterAuth();
      } catch (err) {
        console.error('Signup unexpected error:', err);
        showMessage('สร้างบัญชีไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
      } finally {
        setButtonsDisabled(false);
      }
    }

    async function resetPassword() {
      const email = getEmail();

      if (!email) {
        showMessage('กรุณากรอกอีเมลก่อนกดตั้งรหัสผ่านใหม่', 'error');
        return;
      }

      setButtonsDisabled(true);
      showMessage('กำลังส่งลิงก์ตั้งรหัสผ่าน...');

      try {
        const { error } = await sb.auth.resetPasswordForEmail(email, {
          redirectTo: 'https://legoscanner.app/reset-password.html'
        });

        if (error) {
          console.error('Reset password error:', error);
          showMessage('ส่งลิงก์ตั้งรหัสผ่านไม่สำเร็จ', 'error');
          return;
        }

        showMessage('ส่งลิงก์ตั้งรหัสผ่านไปที่อีเมลแล้ว กรุณาเช็กกล่องจดหมาย', 'success');
      } catch (err) {
        console.error('Reset password unexpected error:', err);
        showMessage('ส่งลิงก์ตั้งรหัสผ่านไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
      } finally {
        setButtonsDisabled(false);
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      const ok = initSupabase();

      if (!ok) return;

      document.getElementById('loginBtn').addEventListener('click', login);
      document.getElementById('signupBtn').addEventListener('click', signup);
      document.getElementById('resetBtn').addEventListener('click', resetPassword);
    });
  </script>
</body>
</html>
