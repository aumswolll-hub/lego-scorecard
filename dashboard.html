<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · LEGO SCANNER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,700;1,500&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1A1817; --cream: #F5EFE6; --cream-soft: #FAF6EE;
      --red: #C8312B; --gold: #C49A4A;
      --green: #2E7D32; --yellow: #C68B0B;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Noto Sans Thai', sans-serif; background: var(--cream); color: var(--ink); font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased; }

    .topbar { position: sticky; top: 0; background: var(--cream); border-bottom: 1.5px solid var(--ink); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; z-index: 100; gap: 14px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
    .brand .mark { background: var(--ink); color: var(--cream); padding: 5px 9px; font-family: 'Fraunces', serif; font-weight: 700; font-size: 11px; letter-spacing: 0.2em; }
    .brand .name { font-family: 'Fraunces', serif; font-weight: 700; font-size: 18px; }
    .brand .name em { font-style: italic; color: var(--red); font-weight: 500; }
    .nav { display: flex; gap: 18px; align-items: center; }
    .nav a { color: var(--ink); text-decoration: none; font-size: 13px; font-weight: 500; opacity: 0.7; }
    .nav a.active { opacity: 1; font-weight: 700; border-bottom: 2px solid var(--red); padding-bottom: 4px; }
    .nav a:hover { opacity: 1; }

    main { max-width: 1280px; margin: 0 auto; padding: 32px 24px 80px; }
    h1 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 34px; margin: 0 0 6px; }
    h1 em { font-style: italic; color: var(--red); font-weight: 500; }
    .sub { color: rgba(26,24,23,0.65); font-size: 14px; margin-bottom: 28px; }

    .stat-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 26px; }
    .stat-card { background: var(--cream-soft); border: 1.5px solid var(--ink); padding: 16px; }
    .stat-card .label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(26,24,23,0.55); font-weight: 600; margin-bottom: 6px; }
    .stat-card .value { font-family: 'Fraunces', serif; font-weight: 700; font-size: 28px; line-height: 1; }
    .stat-card.alert .value { color: var(--red); }
    .stat-card.good  .value { color: var(--green); }

    .panel { background: var(--cream-soft); border: 1.5px solid var(--ink); padding: 20px; margin-bottom: 22px; }
    .panel h2 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 22px; margin: 0 0 4px; }
    .panel h2 em { color: var(--red); font-style: italic; font-weight: 500; }
    .panel .desc { font-size: 13px; color: rgba(26,24,23,0.6); margin-bottom: 14px; }

    .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab { background: transparent; border: 1.5px solid var(--ink); padding: 8px 14px; font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--ink); }
    .tab.active { background: var(--ink); color: var(--cream); }
    .tab .count { margin-left: 6px; opacity: 0.7; font-weight: 500; }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    .pcard { background: var(--cream); border: 1.5px solid var(--ink); padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    .pcard .name { font-family: 'Fraunces', serif; font-weight: 700; font-size: 15px; line-height: 1.25; }
    .pcard .row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .pcard .score { font-family: 'Fraunces', serif; font-weight: 700; font-size: 18px; }
    .pcard .score .max { font-size: 10px; opacity: 0.5; }
    .pcard .meta { color: rgba(26,24,23,0.6); font-size: 11px; }
    .pcard select { font: inherit; font-size: 12px; padding: 4px 6px; border: 1px solid var(--ink); background: var(--cream-soft); width: 100%; }
    .pcard button { font: inherit; font-size: 11px; font-weight: 600; padding: 5px 10px; border: 1.5px solid var(--ink); background: var(--ink); color: var(--cream); cursor: pointer; }

    .decision-tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.18em; padding: 2px 7px; }
    .decision-tag.pick { background: #C8E8C0; color: #1B5E20; }
    .decision-tag.wait { background: #F6E2A7; color: #6E4E00; }
    .decision-tag.drop { background: #F5C9C6; color: #7A1F1B; }

    .action-tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.16em; padding: 2px 7px; border: 1px solid var(--ink); }
    .action-tag.TEST_NOW       { background: var(--ink); color: var(--cream); }
    .action-tag.SCALE          { background: var(--green); color: #fff; border-color: var(--green); }
    .action-tag.WATCHLIST      { background: var(--cream-soft); }
    .action-tag.DROP           { background: #F5C9C6; }
    .action-tag.RESCAN_NEEDED  { background: var(--gold); color: #fff; border-color: var(--gold); }

    .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
    .controls .label { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(26,24,23,0.55); }
    .controls select, .controls input { font: inherit; font-size: 12px; padding: 6px 10px; border: 1.5px solid var(--ink); background: var(--cream); color: var(--ink); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12.5px; min-width: 1100px; }
    th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid rgba(26,24,23,0.12); vertical-align: top; }
    th { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(26,24,23,0.6); font-weight: 600; background: var(--cream-soft); position: sticky; top: 0; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    td .pname { font-weight: 600; }
    td .cat { font-size: 11px; color: rgba(26,24,23,0.6); }
    td select, td input, td textarea { font: inherit; font-size: 12px; padding: 4px 6px; border: 1px solid var(--ink); background: var(--cream-soft); width: 100%; }
    td textarea { min-height: 36px; resize: vertical; }
    td button { font: inherit; font-size: 11px; font-weight: 600; padding: 5px 10px; border: 1.5px solid var(--ink); background: var(--ink); color: var(--cream); cursor: pointer; }
    td button.saving { opacity: 0.5; }
    td button.saved   { background: var(--green); border-color: var(--green); }

    .leaks { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    .leak-card { background: var(--cream); border-left: 4px solid var(--red); border: 1.5px solid var(--ink); border-left: 4px solid var(--red); padding: 14px 16px; font-size: 14px; }

    .state { text-align: center; padding: 60px 20px; color: rgba(26,24,23,0.55); }
    .state.empty { font-family: 'Fraunces', serif; font-style: italic; font-size: 17px; }
    .state.error { color: var(--red); font-weight: 600; }

    .pcard .openbtn, td .openbtn { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }

    /* ── Run Rate panel ── */
    .runrate { background: var(--ink); color: var(--cream); padding: 24px 26px; margin-bottom: 22px; }
    .runrate .head { display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
    .runrate h2 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 22px; margin: 0; color: var(--cream); }
    .runrate h2 em { color: var(--gold); font-style: italic; font-weight: 500; }
    .runrate .date { font-size: 12px; opacity: 0.7; }
    .runrate .target-row { display: flex; gap: 10px; align-items: center; font-size: 13px; }
    .runrate .target-row label { opacity: 0.75; }
    .runrate .target-row input { font: inherit; font-size: 14px; padding: 7px 10px; border: 1.5px solid var(--cream); background: transparent; color: var(--cream); width: 130px; }
    .runrate .target-row input::placeholder { color: rgba(245,239,230,0.45); }
    .runrate .target-row .baht { opacity: 0.7; }

    .runrate .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
    .runrate .kpi { background: rgba(245,239,230,0.06); border: 1px solid rgba(245,239,230,0.2); padding: 14px; }
    .runrate .kpi .label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.6; font-weight: 600; margin-bottom: 6px; }
    .runrate .kpi .value { font-family: 'Fraunces', serif; font-weight: 700; font-size: 26px; line-height: 1; color: var(--cream); }
    .runrate .kpi .value em { font-style: italic; color: var(--gold); }
    .runrate .kpi .sub { font-size: 11px; opacity: 0.65; margin-top: 4px; }
    .runrate .kpi.gap.behind .value { color: #FF8E89; }
    .runrate .kpi.gap.ahead .value  { color: #A6E29A; }

    .runrate .progress-wrap { margin-bottom: 18px; }
    .runrate .progress-labels { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.65; margin-bottom: 6px; }
    .runrate .progress-bar { background: rgba(245,239,230,0.12); height: 16px; position: relative; overflow: hidden; }
    .runrate .progress-bar .actual { position: absolute; top: 0; left: 0; bottom: 0; background: var(--gold); }
    .runrate .progress-bar .projected { position: absolute; top: 0; left: 0; bottom: 0; background: rgba(196,154,74,0.25); border-right: 2px dashed var(--gold); }
    .runrate .progress-bar .target-mark { position: absolute; top: -3px; bottom: -3px; right: 0; width: 2px; background: var(--cream); }

    .runrate .actionplan { background: rgba(245,239,230,0.06); border-left: 4px solid var(--gold); padding: 14px 16px; }
    .runrate .actionplan .title { font-family: 'Fraunces', serif; font-style: italic; font-size: 15px; color: var(--gold); margin-bottom: 6px; }
    .runrate .actionplan .lead { font-size: 14px; line-height: 1.55; margin-bottom: 10px; }
    .runrate .actionplan ul { margin: 0; padding-left: 18px; font-size: 13px; line-height: 1.7; }
    .runrate .actionplan li strong { color: var(--gold); }
    .runrate .actionplan.unset { border-color: rgba(245,239,230,0.3); }
    .runrate .actionplan.unset .title { color: rgba(245,239,230,0.6); }

    .runrate .toggle-btn { background: transparent; color: var(--cream); border: 1.5px solid var(--cream); padding: 7px 14px; font: inherit; font-size: 12px; cursor: pointer; }
    .runrate.collapsed .body { display: none; }

    @media (max-width: 900px) {
      .runrate .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Modal: results section ── */
    .modal .results-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .modal .results-grid .field input[type=number] { width: 100%; }
    .modal .results-grid .field-check { display: flex; align-items: center; gap: 8px; padding-top: 22px; font-size: 13px; }

    /* ── Modal ── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(26,24,23,0.55); display: none; align-items: flex-start; justify-content: center; z-index: 200; padding: 32px 16px; overflow-y: auto; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--cream); border: 1.5px solid var(--ink); max-width: 760px; width: 100%; padding: 24px 26px; position: relative; }
    .modal h3 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 22px; margin: 0 0 6px; }
    .modal h3 em { color: var(--red); font-style: italic; font-weight: 500; }
    .modal .meta { font-size: 12px; color: rgba(26,24,23,0.6); margin-bottom: 16px; }
    .modal .close { position: absolute; top: 12px; right: 14px; background: transparent; border: none; font-size: 22px; cursor: pointer; color: var(--ink); }
    .modal .section-title { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(26,24,23,0.55); font-weight: 600; margin: 18px 0 8px; }
    .modal .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal .field { display: flex; flex-direction: column; gap: 4px; }
    .modal .field label { font-size: 11px; font-weight: 600; color: rgba(26,24,23,0.7); }
    .modal .field .ro { padding: 7px 10px; background: var(--cream-soft); border: 1px solid rgba(26,24,23,0.2); font-size: 13px; min-height: 32px; }
    .modal .field input { padding: 7px 10px; border: 1.5px solid var(--ink); background: var(--cream-soft); font: inherit; font-size: 13px; }
    .modal .field input:disabled { background: var(--cream-soft); color: var(--ink); border-color: rgba(26,24,23,0.25); }
    .modal .legacy-warn { background: #F6E2A7; color: #6E4E00; padding: 10px 12px; font-size: 12px; margin-bottom: 12px; border-left: 4px solid var(--gold); }
    .modal .score-summary { background: var(--cream-soft); border: 1.5px solid var(--ink); padding: 12px 14px; margin-top: 16px; display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap; }
    .modal .score-summary .big { font-family: 'Fraunces', serif; font-weight: 700; font-size: 26px; }
    .modal .score-summary .big .max { font-size: 12px; opacity: 0.5; }
    .modal .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; flex-wrap: wrap; }
    .modal .actions button { font: inherit; font-size: 13px; font-weight: 600; padding: 9px 16px; border: 1.5px solid var(--ink); background: transparent; color: var(--ink); cursor: pointer; }
    .modal .actions button.primary { background: var(--ink); color: var(--cream); }
    .modal .actions button.primary.saving { opacity: 0.6; }
    .modal .actions button.primary.saved { background: var(--green); border-color: var(--green); }
    .modal .err { color: var(--red); font-size: 12px; margin-top: 8px; }

    @media (max-width: 640px) {
      .modal .fields { grid-template-columns: 1fr; }
    }

    @media (max-width: 900px) {
      .stat-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      main { padding: 24px 14px 64px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <span class="mark">LM</span>
      <span class="name">LEGO <em>Scanner</em></span>
    </a>
    <nav class="nav">
      <a href="/">Scanner</a>
      <a href="/dashboard.html" class="active">Dashboard</a>
      <a href="/history.html">ประวัติ</a>
    </nav>
  </header>

  <main>
    <h1>LEGO Scanner <em>Dashboard</em></h1>
    <div class="sub">เปิดหน้านี้แล้วรู้ทันทีว่าวันนี้ควร Test / Scale / Drop สินค้าไหน</div>

    <div id="content"><div class="state">กำลังโหลด…</div></div>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modalBox"></div>
  </div>

  <script>
  const SESSION_KEY = "lego_session";

  function getSession() {
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (!s || !s.token) return null;
      return s;
    } catch { return null; }
  }

  function setState(html, kind) {
    const cls = kind ? ` ${kind}` : "";
    document.getElementById("content").innerHTML =
      `<div class="state${cls}">${html}</div>`;
  }

  function escapeHTML(s) {
    return String(s ?? "").replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function decisionClass(d) {
    if (!d) return "";
    const up = String(d).toUpperCase();
    if (up === "PICK" || up === "VALIDATED" || up === "SCALE") return "pick";
    if (up === "WAIT" || up === "RISKY" || up === "TEST") return "wait";
    return "drop";
  }

  function fmtDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    if (isNaN(d.getTime())) return "—";
    return d.toLocaleDateString("th-TH", { year: "2-digit", month: "short", day: "numeric" });
  }

  function fmtNum(n) {
    if (n === null || n === undefined || n === "") return "—";
    const v = Number(n);
    if (!Number.isFinite(v)) return "—";
    return v.toLocaleString("th-TH", { maximumFractionDigits: 2 });
  }

  const ACTION_LABELS = {
    TEST_NOW:      "ควร Test",
    SCALE:         "ควร Scale",
    WATCHLIST:     "รอดูต่อ",
    DROP:          "ควร Drop",
    RESCAN_NEEDED: "ควรสแกนใหม่",
  };

  const STATUS_OPTIONS = [
    "Not Tested", "Testing", "Posted", "Got Order",
    "No Order", "Scaling", "Dropped",
  ];

  let DATA = null;
  let activeTab = "TEST_NOW";
  let filters = { decision: "ALL", action: "ALL", status: "ALL", category: "ALL", search: "" };

  // ── API ────────────────────────────────────────────────────
  async function loadDashboard() {
    const session = getSession();
    if (!session) {
      setState('กรุณาเข้าสู่ระบบก่อน — <a href="/" style="color:var(--red)">ไปหน้า login</a>', "error");
      return;
    }
    setState("กำลังโหลด…");
    try {
      const r = await fetch("/api/dashboard-data", {
        headers: { "x-session-token": session.token },
      });
      if (r.status === 401) {
        setState('เซสชันหมดอายุ — <a href="/" style="color:var(--red)">เข้าสู่ระบบใหม่</a>', "error");
        return;
      }
      if (!r.ok) {
        setState("โหลดข้อมูลไม่สำเร็จ ลองใหม่อีกครั้ง", "error");
        return;
      }
      DATA = await r.json();
      render();
    } catch (e) {
      console.error(e);
      setState("เกิดข้อผิดพลาด ลองใหม่อีกครั้ง", "error");
    }
  }

  async function saveTracker(payload, btn) {
    const session = getSession();
    if (!session) return;
    if (btn) { btn.classList.add("saving"); btn.textContent = "กำลังบันทึก…"; }
    try {
      const r = await fetch("/api/tracker-update", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-session-token": session.token,
        },
        body: JSON.stringify(payload),
      });
      if (!r.ok) throw new Error("save_failed");
      if (btn) {
        btn.classList.remove("saving");
        btn.classList.add("saved");
        btn.textContent = "✓ บันทึกแล้ว";
        setTimeout(() => { btn.classList.remove("saved"); btn.textContent = "บันทึกสถานะ"; }, 1500);
      }
      return true;
    } catch (e) {
      console.error(e);
      if (btn) { btn.classList.remove("saving"); btn.textContent = "ลองใหม่"; }
      return false;
    }
  }

  // ── Render ─────────────────────────────────────────────────
  function render() {
    if (!DATA) return;
    const { summary, action_groups, products, opportunity_leaks } = DATA;

    const html = `
      ${renderRunRate(products, action_groups)}
      ${renderSummary(summary)}
      ${renderTodayPanel(action_groups)}
      ${renderLeaks(opportunity_leaks)}
      ${renderTable(products)}
    `;
    document.getElementById("content").innerHTML = html;
    bindEvents();
    bindRunRate();
  }

  // ── Run Rate ────────────────────────────────────────────────
  function targetKey() {
    const s = getSession();
    return `lego_target_monthly::${(s && s.email) || "anon"}`;
  }
  function collapseKey() {
    const s = getSession();
    return `lego_runrate_collapsed::${(s && s.email) || "anon"}`;
  }
  function getMonthTarget() {
    try { return Math.max(0, Number(localStorage.getItem(targetKey()) || 0)); }
    catch { return 0; }
  }
  function setMonthTarget(v) {
    try { localStorage.setItem(targetKey(), String(Math.max(0, Number(v) || 0))); } catch {}
  }
  function isRunRateCollapsed() {
    try { return localStorage.getItem(collapseKey()) === "1"; } catch { return false; }
  }
  function setRunRateCollapsed(v) {
    try { localStorage.setItem(collapseKey(), v ? "1" : "0"); } catch {}
  }

  function fmtBaht(n) {
    const v = Number(n || 0);
    if (!Number.isFinite(v)) return "฿0";
    return "฿" + Math.round(v).toLocaleString("th-TH");
  }

  function computeRunRate(products) {
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const monthEnd   = new Date(now.getFullYear(), now.getMonth() + 1, 0);
    const daysInMonth = monthEnd.getDate();
    const dayOfMonth  = now.getDate();
    const daysLeft    = Math.max(0, daysInMonth - dayOfMonth);

    let revenueMTD = 0;
    let postedMTD  = 0;
    let ordersMTD  = 0;
    let productsWithRevenue = 0;
    let scaleCount = 0, testNowCount = 0;

    for (const p of (products || [])) {
      const t = p.last_action_at ? new Date(p.last_action_at) : null;
      const inMonth = t && !isNaN(t.getTime()) && t >= monthStart;
      if (inMonth) {
        revenueMTD += Number(p.revenue_estimate || 0);
        postedMTD  += Number(p.posted_count || 0);
        ordersMTD  += Number(p.order_count || 0);
        if (Number(p.revenue_estimate || 0) > 0) productsWithRevenue++;
      }
      if (p.recommended_action === "SCALE")    scaleCount++;
      if (p.recommended_action === "TEST_NOW") testNowCount++;
    }

    const dailyRate = dayOfMonth > 0 ? revenueMTD / dayOfMonth : 0;
    const projected = dailyRate * daysInMonth;
    const target = getMonthTarget();
    const gapAtEOM = target - projected;
    const gapToday = target > 0 ? Math.max(0, target - revenueMTD) : 0;
    const neededPerDay = daysLeft > 0 && gapAtEOM > 0 ? gapAtEOM / daysLeft : 0;

    return {
      now, daysInMonth, dayOfMonth, daysLeft,
      revenueMTD, postedMTD, ordersMTD,
      productsWithRevenue, scaleCount, testNowCount,
      dailyRate, projected,
      target, gapAtEOM, gapToday, neededPerDay,
      progressActual: target > 0 ? Math.min(1, revenueMTD / target) : 0,
      progressProjected: target > 0 ? Math.min(1, projected / target) : 0,
    };
  }

  function avgRevenuePerClip(rr) {
    if (!rr || !rr.postedMTD) return 0;
    return rr.revenueMTD / rr.postedMTD;
  }

  function buildActionPlan(rr) {
    const target = rr.target;
    if (!target) {
      return {
        title: "ตั้งเป้าค่าคอมเดือนนี้ก่อน",
        lead: "ระบบยังไม่รู้ว่าคุณอยากได้เท่าไหร่ — กรอกเป้าหมายตรงด้านบน แล้วระบบจะคำนวณ run rate + แผนปฏิบัติให้ทันที",
        bullets: [],
        unset: true,
      };
    }

    const bullets = [];
    const avgPerClip = avgRevenuePerClip(rr);

    if (rr.gapAtEOM <= 0) {
      // On track or ahead
      const surplus = Math.abs(rr.gapAtEOM);
      return {
        title: "Run rate เกินเป้าแล้ว — กดต่อ อย่าผ่อน",
        lead: `ถ้าโมเมนตัมแบบนี้ จบเดือนจะได้ราว ${fmtBaht(rr.projected)} (เกินเป้า ${fmtBaht(surplus)})`,
        bullets: [
          rr.scaleCount > 0
            ? `<strong>${rr.scaleCount}</strong> สินค้าอยู่ใน Scale — เพิ่มจำนวนคลิป/ความถี่ของตัวที่ทำเงินจริง อย่าเปลี่ยนสินค้า`
            : `ยังไม่มีสินค้าใน Scale — ตัวที่ได้ออเดอร์แล้วต้องเปลี่ยน status เป็น Got Order/Scaling เพื่อให้ระบบจัดอันดับ`,
          rr.testNowCount > 0
            ? `มี <strong>${rr.testNowCount}</strong> สินค้าใน TEST_NOW — ทดสอบเพิ่มเพื่อหา winner ตัวที่ 2/3 ก่อนจบเดือน`
            : `ลอง scan สินค้าใหม่ ๆ เพื่อ refill pipeline สำหรับเดือนถัดไป`,
        ],
        unset: false,
      };
    }

    // Behind — generate hard plan
    bullets.push(
      `ต้องได้เพิ่ม <strong>${fmtBaht(rr.gapAtEOM)}</strong> ใน <strong>${rr.daysLeft}</strong> วันที่เหลือ → เฉลี่ย <strong>${fmtBaht(rr.neededPerDay)}/วัน</strong>`
    );

    if (avgPerClip > 0) {
      const clipsNeeded = Math.ceil(rr.gapAtEOM / avgPerClip);
      const clipsPerDay = rr.daysLeft > 0 ? Math.ceil(clipsNeeded / rr.daysLeft) : clipsNeeded;
      bullets.push(
        `จากสถิติคุณ: คลิป 1 ตัว ≈ <strong>${fmtBaht(avgPerClip)}</strong> → ต้องลงอีก <strong>${clipsNeeded}</strong> คลิป (~<strong>${clipsPerDay}</strong> คลิป/วัน)`
      );
    } else {
      bullets.push(
        `ยังไม่มีข้อมูลค่าคอมต่อคลิป — กดเข้าไปที่สินค้าที่ลงไปแล้วเพื่ออัปเดต "ผลลัพธ์การโพสต์" ระบบจะคำนวณให้แม่นขึ้น`
      );
    }

    if (rr.scaleCount > 0) {
      bullets.push(
        `Push หนัก: <strong>${rr.scaleCount}</strong> สินค้าในกลุ่ม Scale — เพิ่มความถี่/ทำคลิป angle ใหม่ของตัวเดิมก่อนหาสินค้าใหม่`
      );
    }
    if (rr.testNowCount > 0) {
      bullets.push(
        `ทดสอบ: <strong>${rr.testNowCount}</strong> สินค้าใน TEST_NOW — เริ่มจากตัวคะแนนสูงสุด ลงคลิปแรกภายใน 24 ชม.`
      );
    }
    if (rr.scaleCount === 0 && rr.testNowCount === 0) {
      bullets.push(
        `pipeline ว่าง — สแกนสินค้าใหม่ก่อน 5-10 ตัว วันนี้ ไม่งั้นเป้านี้ไปไม่ถึงแน่`
      );
    }

    // Brutal truth threshold
    const gapRatio = rr.gapAtEOM / target;
    let title, lead;
    if (gapRatio > 0.5 && rr.daysLeft <= 10) {
      title = "ห่างเป้าหนักและเวลาน้อย — ต้องตัดสินใจ";
      lead = `ตอนนี้ run rate จบเดือนจะอยู่ราว ${fmtBaht(rr.projected)} ห่างเป้า ${fmtBaht(rr.gapAtEOM)} (${Math.round(gapRatio*100)}%). ทำต่อแบบเดิมไม่พอ — ต้องเพิ่มจำนวนคลิป/วันแบบขั้นบันได ไม่ใช่หาสินค้าใหม่`;
    } else if (gapRatio > 0.2) {
      title = "ตามเป้าได้แต่ต้องเร่งวันนี้";
      lead = `Run rate ปัจจุบันจบเดือน ${fmtBaht(rr.projected)} ห่างเป้า ${fmtBaht(rr.gapAtEOM)}. ถ้าทำตามแผนด้านล่างทันที ยังไปถึงได้`;
    } else {
      title = "เกือบถึงเป้าแล้ว";
      lead = `ห่างอีก ${fmtBaht(rr.gapAtEOM)} เหลือ ${rr.daysLeft} วัน — เร่งหน่อยจบเดือนนี้ปิดเป้าได้`;
    }

    return { title, lead, bullets, unset: false };
  }

  function renderRunRate(products) {
    const rr = computeRunRate(products);
    const plan = buildActionPlan(rr);
    const collapsed = isRunRateCollapsed();
    const progressActualPct = (rr.progressActual * 100).toFixed(1);
    const progressProjectedPct = (rr.progressProjected * 100).toFixed(1);

    const gapCls = rr.target === 0 ? "" : (rr.gapAtEOM > 0 ? "behind" : "ahead");
    const gapValue = rr.target === 0
      ? "—"
      : (rr.gapAtEOM > 0 ? `-${fmtBaht(rr.gapAtEOM)}` : `+${fmtBaht(Math.abs(rr.gapAtEOM))}`);

    const dateLabel = `วันที่ ${rr.dayOfMonth} / ${rr.daysInMonth} · เหลืออีก ${rr.daysLeft} วัน`;

    return `
      <div class="runrate ${collapsed ? "collapsed" : ""}" id="runrateBox">
        <div class="head">
          <div>
            <h2>Run <em>Rate</em> · เป้าหมายเดือนนี้</h2>
            <div class="date">${escapeHTML(dateLabel)}</div>
          </div>
          <div class="target-row">
            <label for="rrTarget">เป้าค่าคอม/เดือน:</label>
            <input id="rrTarget" type="number" min="0" step="500" placeholder="เช่น 50000" value="${rr.target || ""}" />
            <span class="baht">บาท</span>
            <button class="toggle-btn" id="rrToggle">${collapsed ? "เปิดดู" : "ย่อ"}</button>
          </div>
        </div>
        <div class="body">
          <div class="kpi-grid">
            <div class="kpi">
              <div class="label">ค่าคอมเดือนนี้</div>
              <div class="value"><em>${fmtBaht(rr.revenueMTD)}</em></div>
              <div class="sub">${rr.productsWithRevenue} สินค้าที่มีรายได้</div>
            </div>
            <div class="kpi">
              <div class="label">คลิปที่ลงแล้ว</div>
              <div class="value">${rr.postedMTD}</div>
              <div class="sub">${rr.ordersMTD} ออเดอร์รวม</div>
            </div>
            <div class="kpi">
              <div class="label">Projected สิ้นเดือน</div>
              <div class="value">${fmtBaht(rr.projected)}</div>
              <div class="sub">${fmtBaht(rr.dailyRate)}/วัน</div>
            </div>
            <div class="kpi gap ${gapCls}">
              <div class="label">Gap จากเป้า</div>
              <div class="value">${gapValue}</div>
              <div class="sub">${rr.target ? (rr.gapAtEOM > 0 ? `ต้องเร่ง ${fmtBaht(rr.neededPerDay)}/วัน` : "เกินเป้าแล้ว") : "ตั้งเป้าก่อน"}</div>
            </div>
          </div>

          ${rr.target > 0 ? `
          <div class="progress-wrap">
            <div class="progress-labels">
              <span>ทำได้จริง ${progressActualPct}% · projected ${progressProjectedPct}%</span>
              <span>เป้า ${fmtBaht(rr.target)}</span>
            </div>
            <div class="progress-bar">
              <div class="projected" style="width:${Math.min(100, rr.progressProjected*100)}%;"></div>
              <div class="actual"    style="width:${Math.min(100, rr.progressActual*100)}%;"></div>
              <div class="target-mark"></div>
            </div>
          </div>` : ""}

          <div class="actionplan ${plan.unset ? "unset" : ""}">
            <div class="title">${escapeHTML(plan.title)}</div>
            <div class="lead">${plan.lead}</div>
            ${plan.bullets.length ? `<ul>${plan.bullets.map(b => `<li>${b}</li>`).join("")}</ul>` : ""}
          </div>
        </div>
      </div>
    `;
  }

  function bindRunRate() {
    const inp = document.getElementById("rrTarget");
    const tog = document.getElementById("rrToggle");
    if (inp) {
      let t = null;
      inp.addEventListener("input", () => {
        clearTimeout(t);

          setMonthTarget(inp.value);
          render();
        }, 350);
      });

  function renderLeaks(leaks) {

    return `
      <div class="panel">
        <h2>โอกาส<em>ที่กำลังหลุดมือ</em></h2>
        <div class="desc">ระบบสรุปจุดที่คุณอาจพลาด — แก้วันนี้ก่อนยอดหลุดเดือนนี้</div>
        <div class="leaks">
          ${leaks.map(l => `<div class="leak-card">${escapeHTML(l)}</div>`).join("")}

  function renderTable(products) {
    products = products || [];
    const cats = Array.from(new Set(products.map(p => p.category).filter(Boolean))).sort();
    const decisionOpts = ["ALL","PICK","VALIDATED","SCALE","WAIT","TEST","RISKY","DROP","DEAD"];
    const actionOpts   = ["ALL","TEST_NOW","SCALE","WATCHLIST","DROP","RESCAN_NEEDED"];
    const statusOpts   = ["ALL", ...STATUS_OPTIONS];

    const ctlDecision = `<select id="fDecision">${decisionOpts.map(o => `<option value="${o}"${filters.decision===o?" selected":""}>${o}</option>`).join("")}</select>`;
    const ctlAction   = `<select id="fAction">${actionOpts.map(o => `<option value="${o}"${filters.action===o?" selected":""}>${o === "ALL" ? "ALL" : ACTION_LABELS[o]}</option>`).join("")}</select>`;
    const ctlStatus   = `<select id="fStatus">${statusOpts.map(o => `<option value="${o}"${filters.status===o?" selected":""}>${o}</option>`).join("")}</select>`;
    const ctlCat      = `<select id="fCategory"><option value="ALL"${filters.category==="ALL"?" selected":""}>ALL</option>${cats.map(c => `<option value="${escapeHTML(c)}"${filters.category===c?" selected":""}>${escapeHTML(c)}</option>`).join("")}</select>`;
    const ctlSearch   = `<input id="fSearch" type="search" placeholder="ค้นหาชื่อสินค้า…" value="${escapeHTML(filters.search)}" />`;

    const filtered = products.filter(p => {
      if (filters.decision !== "ALL" && String(p.decision || "").toUpperCase() !== filters.decision) return false;
      if (filters.action   !== "ALL" && p.recommended_action !== filters.action) return false;
      if (filters.status   !== "ALL" && (p.user_status || "Not Tested") !== filters.status) return false;
      if (filters.category !== "ALL" && (p.category || "") !== filters.category) return false;
      if (filters.search) {
        const q = filters.search.toLowerCase();
        if (!String(p.product_name || "").toLowerCase().includes(q)) return false;
      }
      return true;
    });

    const rows = filtered.map(p => {
      const dec = String(p.decision || "").toUpperCase();
      const statusSelect = STATUS_OPTIONS.map(s =>
        `<option value="${escapeHTML(s)}"${(p.user_status || "Not Tested") === s ? " selected" : ""}>${escapeHTML(s)}</option>`
      ).join("");
      return `
        <tr data-key="${escapeHTML(p.product_key)}" data-scan="${escapeHTML(p.latest_scan_id || "")}">
          <td>
            <div class="pname">${escapeHTML(p.product_name || "(ไม่ระบุชื่อ)")}</div>
            <div class="cat">${escapeHTML(p.shop_name || "")}</div>
          </td>
          <td>${escapeHTML(p.category || "—")}</td>
          <td class="num">${p.score_total ?? "—"}${p.score_max ? `/${p.score_max}` : ""}</td>
          <td>${dec ? `<span class="decision-tag ${decisionClass(dec)}">${escapeHTML(dec)}</span>` : "—"}</td>
          <td><span class="action-tag ${p.recommended_action}">${escapeHTML(ACTION_LABELS[p.recommended_action] || p.recommended_action || "—")}</span></td>
          <td class="num">${fmtNum(p.commission_rate)}</td>
          <td class="num">${fmtNum(p.orders_7d)}</td>
          <td class="num">${fmtNum(p.orders_30d)}</td>
          <td class="num">${fmtNum(p.ctr)}</td>
          <td class="num">${fmtNum(p.atc_7d)}</td>
          <td class="num">${fmtNum(p.stock)}</td>
          <td>${escapeHTML(fmtDate(p.last_scanned_at))}</td>
          <td><select class="row-status">${statusSelect}</select></td>
          <td><textarea class="row-notes" placeholder="หมายเหตุ…">${escapeHTML(p.notes || "")}</textarea></td>
          <td>
            <button class="row-save">บันทึกสถานะ</button>
            <button class="openbtn" style="margin-top:4px;" onclick="openProductModal('${escapeHTML(p.product_key)}')">ดู / แก้ไข</button>
          </td>
        </tr>
      `;
    }).join("");

    const body = filtered.length
      ? `<div class="table-wrap"><table>
          <thead><tr>
            <th>Product</th><th>Category</th><th class="num">Score</th>
            <th>Decision</th><th>Recommended</th>
            <th class="num">Commission</th><th class="num">Orders 7D</th><th class="num">Orders 30D</th>
            <th class="num">CTR</th><th class="num">ATC 7D</th><th class="num">Stock</th>
            <th>Last Scanned</th><th>User Status</th><th>หมายเหตุ</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table></div>`
      : `<div class="state empty">ไม่มีสินค้าที่ตรงกับตัวกรอง</div>`;

    return `
      <div class="panel">
        <h2>Product <em>Priority</em></h2>
        <div class="desc">รายการทั้งหมด พร้อม recommended action — อัปเดตสถานะหรือบันทึกความคิดได้ทันที</div>
        <div class="controls">
          <span class="label">Decision</span>${ctlDecision}
          <span class="label">Action</span>${ctlAction}
          <span class="label">Status</span>${ctlStatus}
          <span class="label">Category</span>${ctlCat}
          ${ctlSearch}
        </div>
        ${body}
      </div>
    `;
  }

  // ── Events ─────────────────────────────────────────────────
  function bindEvents() {
    document.querySelectorAll(".tab[data-tab]").forEach(btn => {
      btn.addEventListener("click", () => {
        activeTab = btn.dataset.tab;
        render();
      });
    });

    document.querySelectorAll(".card-save").forEach(btn => {
      btn.addEventListener("click", async () => {
        const card = btn.closest(".pcard");
        const key = btn.dataset.key;
        const scanId = btn.dataset.scan || null;
        const sel = card.querySelector(".card-status");
        const ok = await saveTracker({
          product_key: key,
          latest_scan_id: scanId || undefined,
          user_status: sel.value,
        }, btn);
        if (ok) reloadSoon();
      });
    });

    document.querySelectorAll("tr[data-key] .row-save").forEach(btn => {
      btn.addEventListener("click", async () => {
        const tr = btn.closest("tr");
        const key = tr.dataset.key;
        const scanId = tr.dataset.scan || null;
        const sel = tr.querySelector(".row-status");
        const notes = tr.querySelector(".row-notes");
        const ok = await saveTracker({
          product_key: key,
          latest_scan_id: scanId || undefined,
          user_status: sel.value,
          notes: notes.value,
        }, btn);
        if (ok) reloadSoon();
      });
    });

    const fDec = document.getElementById("fDecision");
    const fAct = document.getElementById("fAction");
    const fSt  = document.getElementById("fStatus");
    const fCat = document.getElementById("fCategory");
    const fSr  = document.getElementById("fSearch");
    if (fDec) fDec.addEventListener("change", e => { filters.decision = e.target.value; render(); });
    if (fAct) fAct.addEventListener("change", e => { filters.action   = e.target.value; render(); });
    if (fSt)  fSt.addEventListener("change",  e => { filters.status   = e.target.value; render(); });
    if (fCat) fCat.addEventListener("change", e => { filters.category = e.target.value; render(); });
    if (fSr)  fSr.addEventListener("input",   e => { filters.search   = e.target.value; render(); });
  }

  let reloadTimer = null;
  function reloadSoon() {
    clearTimeout(reloadTimer);
    reloadTimer = setTimeout(loadDashboard, 800);
  }

  // ════════════════════════════════════════════════
  // Detail / Edit modal
  // Shows when the product was scanned + every raw field entered.
  // Edit mode lets the student update the metrics weekly, recomputes
  // score + decision locally, then POSTs as a NEW scan via /api/scans-save
  // so the historical trajectory is preserved.
  // ════════════════════════════════════════════════

  // Validation-mode scoring (ported from index.html)
  function vScoreCommission(c){ if(c==null||isNaN(c))return null; if(c>=15)return 3; if(c>=10)return 2; if(c>=5)return 1; return 0; }
  function vScoreOrders(o7,o30){ if(o7==null||o30==null)return null; if(o30===0)return 0; const e=o30*(7/30); const r=o7/e; if(r>=1.2)return 3; if(r>=0.85)return 2; return 1; }
  function vScoreCTR(ctr){ if(ctr==null)return null; if(ctr>=8)return 3; if(ctr>=4)return 2; return 1; }
  function vScoreATC(a7,a30){ if(a7==null||a30==null)return null; if(a30===0)return 0; const e=a30*(7/30); const r=a7/e; if(r>=1.0)return 3; if(r>=0.7)return 2; return 1; }
  function vScoreCVR(o30,a30){ if(o30==null||a30==null||a30===0)return null; const cvr=o30/a30; if(cvr>=0.25)return 3; if(cvr>=0.15)return 2; return 1; }
  function vScoreStock(stock,o30){ if(stock==null)return null; if(o30==null||o30===0){ if(stock>100)return 2; return 1; } const days=stock/(o30/30); if(days>=14)return 3; if(days>=5)return 2; return 1; }
  function vScoreOPC(o30,c30){ if(o30==null||c30==null||c30===0)return null; const opc=o30/c30; if(opc>=4.0)return 3; if(opc>=2.0)return 2; return 1; }
  function vScoreCG(c7,c30){ if(c7==null||c30==null)return null; if(c30===0)return 0; const e=c30*(7/30); const r=c7/e; if(r>=1.0)return 3; if(r>=0.7)return 2; return 1; }
  function vScoreCreatorCombined(o30,c7,c30){ const a=vScoreOPC(o30,c30); const b=vScoreCG(c7,c30); if(a==null&&b==null)return null; if(a==null)return b; if(b==null)return a; return Math.round((a+b)/2); }

  // Discovery-mode scoring (ported from index.html)
  function dScoreCommission(c){ if(c==null||isNaN(c))return null; if(c>=20)return 3; if(c>=15)return 2; if(c>=10)return 1; return 0; }
  function dScoreDemand(d7,d30){ if(d7==null||d30==null)return null; if(d7>0)return 3; if(d7<=0&&d30>0&&Math.abs(d7)/d30<0.2)return 2; return 1; }
  function dScoreProbability(cr){ if(cr==null)return null; if(cr>=20)return 3; if(cr>=10)return 2; return 1; }
  function dScoreConcentration(c){ if(c==null)return null; if(c<30)return 3; if(c<=60)return 2; return 1; }

  // Field specs — order + label for each mode
  const VALIDATION_FIELDS = [
    { key: "v_commission", label: "Commission %" },
    { key: "v_orders7",    label: "Orders 7 วัน" },
    { key: "v_orders30",   label: "Orders 30 วัน" },
    { key: "v_ctr",        label: "CTR %" },
    { key: "v_atc7",       label: "ATC 7 วัน" },
    { key: "v_atc30",      label: "ATC 30 วัน" },
    { key: "v_creators7",  label: "Creators 7 วัน" },
    { key: "v_creators30", label: "Creators 30 วัน" },
    { key: "v_stock",      label: "Stock คงเหลือ" },
  ];
  const DISCOVERY_FIELDS = [
    { key: "commission",   label: "Commission %" },
    { key: "gmv7",         label: "GMV 7 วัน" },
    { key: "gmv30",        label: "GMV 30 วัน" },
    { key: "creators",     label: "Creators" },
    { key: "cr",           label: "CR %" },
    { key: "conc",         label: "Concentration %" },
  ];

  function detectMode(p, raw) {
    if (p && p.mode === "validation") return "validation";
    if (p && p.mode === "discovery")  return "discovery";
    if (raw && raw.mode === "validation") return "validation";
    if (raw && raw.mode === "discovery")  return "discovery";
    if (raw && (raw.v_orders7 != null || raw.v_orders30 != null || raw.v_ctr != null)) return "validation";
    return "discovery";
  }

  function fieldsForMode(mode) {
    return mode === "validation" ? VALIDATION_FIELDS : DISCOVERY_FIELDS;
  }

  // Recompute total/max/pct/decision from the raw inputs.
  function recompute(mode, raw) {
    if (mode === "validation") {
      const comm = num(raw.v_commission);
      const o7 = num(raw.v_orders7), o30 = num(raw.v_orders30);
      const ctr = num(raw.v_ctr);
      const a7 = num(raw.v_atc7), a30 = num(raw.v_atc30);
      const c7 = num(raw.v_creators7), c30 = num(raw.v_creators30);
      const stock = num(raw.v_stock);
      const sComm = vScoreCommission(comm);
      const sOrd  = vScoreOrders(o7, o30);
      const sCtr  = vScoreCTR(ctr);
      const sAtc  = vScoreATC(a7, a30);
      const sCvr  = vScoreCVR(o30, a30);
      const sCre  = vScoreCreatorCombined(o30, c7, c30);
      const sSt   = vScoreStock(stock, o30);
      const total = (sComm||0)+(sOrd||0)+(sCtr||0)+(sAtc||0)+(sCvr||0)+(sCre||0)+(sSt||0);
      const max = 21;
      const pct = total / max;
      const decision = pct >= 0.74 ? "VALIDATED" : pct >= 0.5 ? "RISKY" : "DEAD";
      return { total, max, pct, decision };
    } else {
      const comm = num(raw.commission);
      const d7 = num(raw.gmv7), d30 = num(raw.gmv30);
      const cr = num(raw.cr), conc = num(raw.conc);
      const sComm = dScoreCommission(comm);
      const sDem  = dScoreDemand(d7, d30);
      const sProb = dScoreProbability(cr);
      const sConc = dScoreConcentration(conc);
      const angles = Array.isArray(raw.angles) ? raw.angles.filter(Boolean) : [];
      const sAng  = angles.length === 0 ? null : angles.length >= 3 ? 3 : angles.length === 2 ? 2 : 1;
      const hasComm = comm !== null;
      let total = (sDem||0)+(sAng||0)+(sProb||0)+(sConc||0);
      if (hasComm) total += (sComm||0);
      const max = hasComm ? 15 : 12;
      const pct = total / max;
      const decision = pct >= 0.74 ? "PICK" : pct >= 0.5 ? "WAIT" : "DROP";
      return { total, max, pct, decision };
    }
  }

  function num(v) {
    if (v === null || v === undefined || v === "") return null;
    const n = typeof v === "number" ? v : Number(v);
    return Number.isFinite(n) ? n : null;
  }

  let modalProduct = null;
  let modalRaw = null;
  let modalMode = "discovery";
  let modalEditing = false;

  function openProductModal(productKey) {
    if (!DATA) return;
    const p = (DATA.products || []).find(x => x.product_key === productKey);
    if (!p) return;
    modalProduct = p;
    modalRaw = (p.raw_scan_result && typeof p.raw_scan_result === "object")
      ? JSON.parse(JSON.stringify(p.raw_scan_result))
      : {};
    modalMode = detectMode(p, modalRaw);
    modalEditing = false;
    renderModal();
    document.getElementById("modalBackdrop").classList.add("open");
  }

  function closeModal() {
    document.getElementById("modalBackdrop").classList.remove("open");
    modalProduct = null; modalRaw = null; modalEditing = false;
  }

  function toggleEdit() {
    modalEditing = !modalEditing;
    renderModal();
  }

  function readEditedRaw() {
    const out = { ...(modalRaw || {}) };
    fieldsForMode(modalMode).forEach(f => {
      const el = document.getElementById("edit_" + f.key);
      if (el) {
        const v = el.value.trim();
        out[f.key] = v === "" ? null : Number(v);
      }
    });
    const nm = document.getElementById("edit_product_name");
    if (nm) out.product = nm.value.trim();
    return out;
  }

  function renderModal() {
    const p = modalProduct;
    if (!p) return;
    const fields = fieldsForMode(modalMode);
    const raw = modalEditing ? readEditedRaw() : modalRaw;
    const computed = recompute(modalMode, raw);
    const dec = String(computed.decision || "").toUpperCase();
    const decCls = decisionClass(dec);

    const legacyWarn = p.is_legacy
      ? `<div class="legacy-warn">รายการนี้มาจาก Tracker เก่า — ข้อมูลบางอย่างอาจไม่ครบ (เช่น Product ID / Shop) เมื่อบันทึก ระบบจะถือว่าเป็นการสแกนใหม่</div>`
      : "";

    const fieldHTML = fields.map(f => {
      const val = raw[f.key];
      const display = (val === null || val === undefined || val === "") ? "—" : String(val);
      if (modalEditing) {
        return `
          <div class="field">
            <label>${escapeHTML(f.label)}</label>
            <input id="edit_${f.key}" type="number" step="any" value="${val == null ? "" : escapeHTML(String(val))}" oninput="onEditChange()" />
          </div>
        `;
      }
      return `
        <div class="field">
          <label>${escapeHTML(f.label)}</label>
          <div class="ro">${escapeHTML(display)}</div>
        </div>
      `;
    }).join("");

    const nameField = modalEditing
      ? `<div class="field" style="grid-column:1/-1;">
           <label>ชื่อสินค้า</label>
           <input id="edit_product_name" type="text" value="${escapeHTML(raw.product || p.product_name || "")}" />
         </div>`
      : "";

    const scannedAt = p.last_scanned_at
      ? new Date(p.last_scanned_at).toLocaleString("th-TH", {
          year: "numeric", month: "short", day: "numeric",
          hour: "2-digit", minute: "2-digit",
        })
      : "—";

    document.getElementById("modalBox").innerHTML = `
      <button class="close" onclick="closeModal()">×</button>
      <h3>${escapeHTML(p.product_name || "(ไม่ระบุชื่อ)")}<em></em></h3>
      <div class="meta">
        สแกนล่าสุด: ${escapeHTML(scannedAt)} · โหมด: ${modalMode === "validation" ? "Validation (TikTok ตัวจริง)" : "Discovery"}
        ${p.shop_name ? " · ร้าน: " + escapeHTML(p.shop_name) : ""}
        ${p.category  ? " · หมวด: " + escapeHTML(p.category)  : ""}
      </div>
      ${legacyWarn}
      <div class="section-title">${modalEditing ? "แก้ไขข้อมูลตัวเลข (อัปเดตเป็นค่าใหม่ของสัปดาห์นี้)" : "ข้อมูลที่กรอกตอนสแกน"}</div>
      <div class="fields">
        ${nameField}
        ${fieldHTML}
      </div>

      <div class="section-title">ผลลัพธ์การโพสต์ (ใช้คำนวณ Run Rate)</div>
      <div class="results-grid">
        <div class="field">
          <label>คลิปที่ลงไปแล้ว</label>
          <input id="res_posted_count" type="number" min="0" step="1" value="${escapeHTML(String(p.posted_count || 0))}" />
        </div>
        <div class="field">
          <label>จำนวนออเดอร์</label>
          <input id="res_order_count" type="number" min="0" step="1" value="${escapeHTML(String(p.order_count || 0))}" />
        </div>
        <div class="field">
          <label>ค่าคอมที่ได้จริง (บาท)</label>
          <input id="res_revenue" type="number" min="0" step="1" value="${escapeHTML(String(p.revenue_estimate || 0))}" />
        </div>
        <div class="field-check">
          <input id="res_got_order" type="checkbox" ${p.got_order ? "checked" : ""} />
          <label for="res_got_order">มีออเดอร์แล้ว</label>
        </div>
      </div>
      <div class="score-summary">
        <div>
          <div style="font-size:10px;letter-spacing:0.2em;color:rgba(26,24,23,0.55);font-weight:600;">${modalEditing ? "คะแนนใหม่ (Preview)" : "คะแนน"}</div>
          <div class="big">${computed.total}<span class="max">/${computed.max}</span></div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:10px;letter-spacing:0.2em;color:rgba(26,24,23,0.55);font-weight:600;">Decision</div>
          ${dec ? `<span class="decision-tag ${decCls}" style="font-size:11px;padding:4px 10px;">${escapeHTML(dec)}</span>` : "—"}
        </div>
      </div>
      <div id="modalErr" class="err" style="display:none;"></div>
      <div class="actions">
        <button onclick="closeModal()">ปิด</button>
        <button id="modalResultsBtn" onclick="saveResults()">บันทึกผลลัพธ์</button>
        ${modalEditing
          ? `<button onclick="toggleEdit()">ยกเลิกการแก้ไข</button>
             <button class="primary" id="modalSaveBtn" onclick="saveEditedScan()">บันทึกเป็นข้อมูลใหม่ของสัปดาห์นี้</button>`
          : `<button class="primary" onclick="toggleEdit()">แก้ไขตัวเลข Scan</button>`
        }
      </div>
    `;
  }

  function onEditChange() {
    // Only re-render the score summary so user keeps focus on the input.
    const raw = readEditedRaw();
    const c = recompute(modalMode, raw);
    const dec = String(c.decision || "").toUpperCase();
    const decCls = decisionClass(dec);
    const sum = document.querySelector(".score-summary");
    if (!sum) return;
    sum.innerHTML = `
      <div>
        <div style="font-size:10px;letter-spacing:0.2em;color:rgba(26,24,23,0.55);font-weight:600;">คะแนนใหม่ (Preview)</div>
        <div class="big">${c.total}<span class="max">/${c.max}</span></div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:10px;letter-spacing:0.2em;color:rgba(26,24,23,0.55);font-weight:600;">Decision</div>
        ${dec ? `<span class="decision-tag ${decCls}" style="font-size:11px;padding:4px 10px;">${escapeHTML(dec)}</span>` : "—"}
      </div>
    `;
  }

  async function saveResults() {
    const p = modalProduct;
    if (!p) return;
    const session = getSession();
    if (!session) return;

    const posted   = Number(document.getElementById("res_posted_count").value || 0);
    const orders   = Number(document.getElementById("res_order_count").value || 0);
    const revenue  = Number(document.getElementById("res_revenue").value || 0);
    const gotOrder = !!document.getElementById("res_got_order").checked;

    const btn = document.getElementById("modalResultsBtn");
    const err = document.getElementById("modalErr");
    err.style.display = "none";
    if (btn) { btn.classList.add("saving"); btn.textContent = "กำลังบันทึก…"; }

    try {
      const r = await fetch("/api/tracker-update", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-session-token": session.token,
        },
        body: JSON.stringify({
          product_key: p.product_key,
          latest_scan_id: p.latest_scan_id || undefined,
          posted_count: posted,
          order_count:  orders,
          revenue_estimate: revenue,
          got_order: gotOrder,
        }),
      });
      if (!r.ok) throw new Error("save_failed");
      if (btn) { btn.classList.remove("saving"); btn.classList.add("saved"); btn.textContent = "✓ บันทึกแล้ว"; }
      setTimeout(() => {
        closeModal();
        loadDashboard();
      }, 700);
    } catch (e) {
      console.error(e);
      if (btn) { btn.classList.remove("saving"); btn.textContent = "ลองใหม่"; }
      err.style.display = "block";
      err.textContent = "บันทึกผลลัพธ์ไม่สำเร็จ";
    }
  }

  async function saveEditedScan() {
    const p = modalProduct;
    if (!p) return;
    const session = getSession();
    if (!session) return;

    const raw = readEditedRaw();
    const name = (raw.product || p.product_name || "").trim();
    if (!name) {
      const err = document.getElementById("modalErr");
      err.style.display = "block";
      err.textContent = "ต้องมีชื่อสินค้า";
      return;
    }
    const c = recompute(modalMode, raw);

    // Build a new scan record (same shape the scanner posts to /api/scans-save).
    const record = {
      ...raw,
      id: Date.now(),
      timestamp: new Date().toISOString(),
      mode: modalMode,
      product: name,
      product_id: p.product_id || raw.product_id || null,
      shop_name: p.shop_name || raw.shop_name || null,
      category:  p.category  || raw.category  || null,
      total: c.total,
      max: c.max,
      pct: c.pct,
      decision: c.decision,
    };

    const btn = document.getElementById("modalSaveBtn");
    const err = document.getElementById("modalErr");
    err.style.display = "none";
    if (btn) { btn.classList.add("saving"); btn.textContent = "กำลังบันทึก…"; }

    try {
      const r = await fetch("/api/scans-save", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-session-token": session.token,
        },
        body: JSON.stringify({ record }),
      });
      if (!r.ok) throw new Error("save_failed");

      if (btn) { btn.classList.remove("saving"); btn.classList.add("saved"); btn.textContent = "✓ บันทึกแล้ว"; }
      setTimeout(() => {
        closeModal();
        loadDashboard();
      }, 700);
    } catch (e) {
      console.error(e);
      if (btn) { btn.classList.remove("saving"); btn.textContent = "ลองใหม่อีกครั้ง"; }
      err.style.display = "block";
      err.textContent = "บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง";
    }
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeModal();
  });

  loadDashboard();
  </script>
</body>
</html>
