<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ประวัติการสแกน · LEGO SCANNER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,700;1,500&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1A1817; --cream: #F5EFE6; --cream-soft: #FAF6EE;
      --red: #C8312B; --gold: #C49A4A;
      --green: #2E7D32; --yellow: #C68B0B;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Noto Sans Thai', sans-serif; background: var(--cream); color: var(--ink); font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
    .topbar { position: sticky; top: 0; background: var(--cream); border-bottom: 1.5px solid var(--ink); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; z-index: 100; gap: 14px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
    .brand .mark { background: var(--ink); color: var(--cream); padding: 5px 9px; font-family: 'Fraunces', serif; font-weight: 700; font-size: 11px; letter-spacing: 0.2em; }
    .brand .name { font-family: 'Fraunces', serif; font-weight: 700; font-size: 18px; }
    .brand .name em { font-style: italic; color: var(--red); font-weight: 500; }
    .nav { display: flex; gap: 18px; align-items: center; }
    .nav a { color: var(--ink); text-decoration: none; font-size: 13px; font-weight: 500; opacity: 0.7; }
    .nav a.active { opacity: 1; font-weight: 700; border-bottom: 2px solid var(--red); padding-bottom: 4px; }
    .nav a:hover { opacity: 1; }

    main { max-width: 1080px; margin: 0 auto; padding: 32px 24px 80px; }
    h1 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 32px; margin: 0 0 6px; }
    h1 em { font-style: italic; color: var(--red); font-weight: 500; }
    .sub { color: rgba(26,24,23,0.65); font-size: 14px; margin-bottom: 28px; }

    .controls { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 22px; padding: 14px 16px; background: var(--cream-soft); border: 1.5px solid var(--ink); }
    .control-group { display: flex; gap: 8px; align-items: center; }
    .control-group .label { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(26,24,23,0.55); }
    .chip { background: transparent; border: 1.5px solid var(--ink); padding: 6px 12px; font: inherit; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--ink); }
    .chip.active { background: var(--ink); color: var(--cream); }
    .chip:hover:not(.active) { background: var(--cream); }
    select.chip { padding: 6px 28px 6px 12px; -webkit-appearance: none; appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--ink) 50%), linear-gradient(135deg, var(--ink) 50%, transparent 50%); background-position: calc(100% - 14px) 14px, calc(100% - 9px) 14px; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; }

    .state { text-align: center; padding: 80px 20px; color: rgba(26,24,23,0.55); }
    .state.empty { font-family: 'Fraunces', serif; font-style: italic; font-size: 18px; }
    .state.error { color: var(--red); font-weight: 600; }

    .scan-list { display: grid; gap: 12px; }
    .scan-row { background: var(--cream-soft); border: 1.5px solid var(--ink); padding: 16px 18px; display: grid; grid-template-columns: 1fr auto; gap: 14px; }
    .scan-head { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .scan-name { font-family: 'Fraunces', serif; font-weight: 700; font-size: 17px; overflow: hidden; text-overflow: ellipsis; }
    .scan-meta { font-size: 12px; color: rgba(26,24,23,0.6); }
    .scan-meta .cat { color: var(--ink); font-weight: 500; }
    .scan-meta .dot { opacity: 0.4; margin: 0 6px; }
    .scan-decide { text-align: right; min-width: 110px; }
    .scan-score { font-family: 'Fraunces', serif; font-weight: 700; font-size: 22px; }
    .scan-score .max { font-size: 11px; opacity: 0.5; margin-left: 2px; font-weight: 500; }
    .scan-tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.2em; padding: 3px 8px; margin-top: 4px; }
    .scan-tag.pick { background: #C8E8C0; color: #1B5E20; }
    .scan-tag.wait { background: #F6E2A7; color: #6E4E00; }
    .scan-tag.drop { background: #F5C9C6; color: #7A1F1B; }

    .scan-details { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 6px; font-size: 13px; }
    .detail-block .title { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(26,24,23,0.55); font-weight: 600; margin-bottom: 4px; }
    .detail-block ul { margin: 0; padding-left: 18px; }
    .detail-block li { margin-bottom: 2px; }
    .detail-block.empty { color: rgba(26,24,23,0.35); font-style: italic; font-size: 12px; }

    @media (max-width: 640px) {
      .scan-details { grid-template-columns: 1fr; }
      main { padding: 24px 16px 64px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <span class="mark">LM</span>
      <span class="name">LEGO <em>Scanner</em></span>
    </a>
    <nav class="nav">
      <a href="/">Scanner</a>
      <a href="/dashboard.html">Dashboard</a>
      <a href="/history.html" class="active">ประวัติ</a>
    </nav>
  </header>

  <main>
    <h1>ประวัติการสแกน<em>ของคุณ</em></h1>
    <div class="sub">ทุกครั้งที่คุณสแกนสินค้าและบันทึก ระบบจะเก็บไว้ที่นี่</div>

    <div class="controls">
      <div class="control-group">
        <span class="label">Decision</span>
        <button class="chip active" data-decision="ALL">ALL</button>
        <button class="chip" data-decision="PICK">PICK</button>
        <button class="chip" data-decision="VALIDATED">VALIDATED</button>
        <button class="chip" data-decision="WAIT">WAIT</button>
        <button class="chip" data-decision="RISKY">RISKY</button>
        <button class="chip" data-decision="DROP">DROP</button>
        <button class="chip" data-decision="DEAD">DEAD</button>
      </div>
      <div class="control-group">
        <span class="label">Sort</span>
        <select id="sortSel" class="chip">
          <option value="latest">ใหม่สุดก่อน</option>
          <option value="score">คะแนนสูงสุดก่อน</option>
        </select>
      </div>
    </div>

    <div id="content"></div>
  </main>

  <script>
    const SESSION_KEY = "lego_session";
    let filterDecision = "ALL";
    let sortBy = "latest";

    function getSession() {
      try {
        const raw = localStorage.getItem(SESSION_KEY);
        if (!raw) return null;
        const s = JSON.parse(raw);
        if (!s || !s.token) return null;
        return s;
      } catch { return null; }
    }

    function setState(html, kind) {
      const cls = kind ? ` ${kind}` : "";
      document.getElementById("content").innerHTML =
        `<div class="state${cls}">${html}</div>`;
    }

    function decisionClass(d) {
      if (!d) return "";
      if (d === "PICK" || d === "VALIDATED" || d === "SCALE") return "pick";
      if (d === "WAIT" || d === "RISKY" || d === "TEST") return "wait";
      return "drop";
    }

    function fmtDate(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (isNaN(d.getTime())) return "";
      return d.toLocaleDateString("th-TH", { year: "numeric", month: "short", day: "numeric" }) +
        " " + d.toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
    }

    function escapeHTML(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function renderRow(s) {
      const tagClass = decisionClass(s.decision);
      const scoreNum = (s.score_total !== null && s.score_total !== undefined) ? s.score_total : "—";
      const scoreMax = (s.score_max !== null && s.score_max !== undefined) ? s.score_max : "";
      const strengths = Array.isArray(s.strengths) ? s.strengths.filter(Boolean) : [];
      const weaknesses = Array.isArray(s.weaknesses) ? s.weaknesses.filter(Boolean) : [];
      return `
        <div class="scan-row">
          <div class="scan-head">
            <div class="scan-name">${escapeHTML(s.product_name || "(ไม่ระบุชื่อสินค้า)")}</div>
            <div class="scan-meta">
              ${s.category ? `<span class="cat">${escapeHTML(s.category)}</span><span class="dot">•</span>` : ""}
              <span>${escapeHTML(fmtDate(s.created_at))}</span>
            </div>
          </div>
          <div class="scan-decide">
            <div class="scan-score">${escapeHTML(String(scoreNum))}${scoreMax ? `<span class="max">/${escapeHTML(String(scoreMax))}</span>` : ""}</div>
            ${s.decision ? `<div class="scan-tag ${tagClass}">${escapeHTML(s.decision)}</div>` : ""}
          </div>
          <div class="scan-details">
            <div class="detail-block ${strengths.length ? "" : "empty"}">
              <div class="title">จุดแข็ง</div>
              ${strengths.length
                ? `<ul>${strengths.map(x => `<li>${escapeHTML(x)}</li>`).join("")}</ul>`
                : "ไม่มีข้อมูล"}
            </div>
            <div class="detail-block ${weaknesses.length ? "" : "empty"}">
              <div class="title">จุดอ่อน / ความเสี่ยง</div>
              ${weaknesses.length
                ? `<ul>${weaknesses.map(x => `<li>${escapeHTML(x)}</li>`).join("")}</ul>`
                : "ไม่มีข้อมูล"}
            </div>
          </div>
        </div>`;
    }

    async function load() {
      const session = getSession();
      if (!session) {
        setState('กรุณาเข้าสู่ระบบก่อน — <a href="/" style="color:var(--red)">ไปหน้า login</a>', "error");
        return;
      }
      setState("กำลังโหลด…");
      try {
        const params = new URLSearchParams();
        if (filterDecision !== "ALL") params.set("decision", filterDecision);
        params.set("sort", sortBy);
        params.set("limit", "200");
        const r = await fetch(`/api/scans-history?${params.toString()}`, {
          headers: { "x-session-token": session.token },
        });
        if (r.status === 401) {
          setState('เซสชันหมดอายุ — <a href="/" style="color:var(--red)">เข้าสู่ระบบใหม่</a>', "error");
          return;
        }
        if (!r.ok) {
          setState("โหลดข้อมูลไม่สำเร็จ ลองใหม่อีกครั้ง", "error");
          return;
        }
        const data = await r.json();
        const rows = (data && data.scans) || [];
        if (!rows.length) {
          setState("ยังไม่มีประวัติการสแกนสินค้า", "empty");
          return;
        }
        document.getElementById("content").innerHTML =
          `<div class="scan-list">${rows.map(renderRow).join("")}</div>`;
      } catch (e) {
        console.error(e);
        setState("เกิดข้อผิดพลาด ลองใหม่อีกครั้ง", "error");
      }
    }

    document.querySelectorAll(".chip[data-decision]").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".chip[data-decision]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        filterDecision = btn.dataset.decision;
        load();
      });
    });
    document.getElementById("sortSel").addEventListener("change", (e) => {
      sortBy = e.target.value;
      load();
    });

    load();
  </script>
</body>
</html>
