<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ตั้งรหัสผ่านใหม่ | LEGO SCANNER</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #171717;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 28px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      color: #b5b5b5;
      line-height: 1.6;
      font-size: 14px;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-size: 14px;
      color: #e5e5e5;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0b0b0b;
      color: white;
      box-sizing: border-box;
      font-size: 15px;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 13px 16px;
      border: 0;
      border-radius: 10px;
      background: #ffffff;
      color: #000000;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }

    a {
      display: block;
      text-align: center;
      margin-top: 14px;
      color: #b5b5b5;
      font-size: 14px;
    }

    .message {
      margin-top: 14px;
      font-size: 14px;
      color: #facc15;
      line-height: 1.5;
    }

    .danger {
      color: #f87171;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>ตั้งรหัสผ่านใหม่</h1>

    <p>
      กรอกรหัสผ่านใหม่สำหรับเข้าใช้งาน LEGO SCANNER
    </p>

    <label for="password">รหัสผ่านใหม่</label>
    <input
      id="password"
      type="password"
      placeholder="อย่างน้อย 6 ตัวอักษร"
      autocomplete="new-password"
    />

    <label for="confirmPassword">ยืนยันรหัสผ่านใหม่</label>
    <input
      id="confirmPassword"
      type="password"
      placeholder="กรอกรหัสผ่านอีกครั้ง"
      autocomplete="new-password"
    />

    <button onclick="updatePassword()">บันทึกรหัสผ่านใหม่</button>

    <a href="/login.html">กลับไปหน้าเข้าสู่ระบบ</a>

    <div id="message" class="message"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://kdfyfnolxhcxswbotolq.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_RxZbbxePB1RakFMi-h7LIQ_EVv0AS9_';

    const supabase = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    function showMessage(text, isError = false) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = isError ? 'message danger' : 'message';
    }

    async function updatePassword() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!password || password.length < 6) {
        showMessage('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', true);
        return;
      }

      if (password !== confirmPassword) {
        showMessage('รหัสผ่านทั้งสองช่องไม่ตรงกัน', true);
        return;
      }

      showMessage('กำลังบันทึกรหัสผ่านใหม่...');

      const { error } = await supabase.auth.updateUser({
        password: password
      });

      if (error) {
        console.error(error);
        showMessage('ตั้งรหัสผ่านไม่สำเร็จ กรุณาขอลิงก์ใหม่อีกครั้ง', true);
        return;
      }

      showMessage('ตั้งรหัสผ่านสำเร็จ กำลังพาไปหน้าเข้าสู่ระบบ...');

      setTimeout(() => {
        window.location.href = '/login.html';
      }, 1000);
    }
  </script>
</body>
</html>
